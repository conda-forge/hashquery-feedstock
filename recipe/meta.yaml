{% set name = "hashquery" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hashquery-{{ version }}.tar.gz
  sha256: fed26f40c335d4eabf23ff80f2ec9516201dff83b0c2ddf8d9eefb749e30125c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - typing-extensions
    - requests
    - pyarrow
    - pandas

test:
  imports:
    - hashquery
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/hashboard-hq/hashquery
  summary: A Python framework for defining and querying BI models in your data warehouse
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
